<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F5132" />
    <title>Hafiz Maulana Faiz Islamic Academy — Authentic Quranic Education for Every Muslim Family</title>
    <meta
      name="description"
      content="Authentic online Quran, Tajweed, Hifz, and Islamic Studies classes with qualified male and female teachers. Book a free trial class today."
    />
    <!-- GitHub Pages SPA routing fix: translate the redirect encoded in the
         404.html query string back into a real path before React Router mounts.
         See: https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
