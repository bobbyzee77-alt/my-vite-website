<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!-- GitHub Pages SPA routing fix — see: https://github.com/rafgraph/spa-github-pages
         pathSegmentsToKeep = 1 because this is a project page served at
         https://<user>.github.io/<repo>/ — change to 0 if deploying to a
         custom domain or a user/org root page (https://<user>.github.io/). -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
